name: Build Android AAB

# Manual trigger only. Run this from the repo's Actions tab whenever you want a
# fresh Play Store bundle — it does NOT run on every web commit. The finished
# .aab is attached to the run as a downloadable artifact; download it and upload
# it in the Google Play Console.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: polo-chukkas-deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build web bundle
        run: npm run build

      - name: Capacitor sync (Android)
        run: npx cap sync android

      - name: Decode upload keystore
        run: |
          echo "$TPPC_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          echo "Keystore written: $(wc -c < android/app/upload-keystore.jks) bytes"
        env:
          TPPC_KEYSTORE_BASE64: ${{ secrets.TPPC_KEYSTORE_BASE64 }}

      - name: Build signed release bundle
        run: cd android && ./gradlew bundleRelease --no-daemon
        env:
          TPPC_KEYSTORE_FILE: upload-keystore.jks
          TPPC_KEYSTORE_PASSWORD: ${{ secrets.TPPC_KEYSTORE_PASSWORD }}
          TPPC_KEY_ALIAS: ${{ secrets.TPPC_KEY_ALIAS }}
          TPPC_KEY_PASSWORD: ${{ secrets.TPPC_KEY_PASSWORD }}
          TPPC_VERSION_CODE: ${{ github.run_number }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: tppc-chukkas-release-aab
          path: polo-chukkas-deploy/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
